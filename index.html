<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>住援研修動画</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#13131a; --card:#1c1c28;
  --accent:#ff6b2b; --accent2:#ffb347;
  --text:#f0f0f5; --muted:#7a7a96; --border:#2a2a3a;
  --green:#2ecc71; --red:#e74c3c; --blue:#3498db;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}

/* ===== LOGIN SCREEN ===== */
#loginScreen {
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  background:var(--bg);
  position:relative;overflow:hidden;
}
#loginScreen::before {
  content:'';position:absolute;top:-30%;left:-20%;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(255,107,43,0.08) 0%,transparent 65%);
  pointer-events:none;
}
#loginScreen::after {
  content:'';position:absolute;bottom:-20%;right:-10%;
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(255,179,71,0.06) 0%,transparent 65%);
  pointer-events:none;
}
.login-box {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  padding:40px 36px;
  width:100%;max-width:400px;
  position:relative;z-index:1;
  animation:fadeUp 0.5s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-logo {
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;color:var(--accent);letter-spacing:3px;
  text-align:center;margin-bottom:4px;
}
.login-logo span{color:var(--text);}
.login-subtitle{text-align:center;font-size:12px;color:var(--muted);margin-bottom:32px;letter-spacing:1px;}
.login-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;display:block;letter-spacing:0.5px;}
.login-input {
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;color:var(--text);
  font-family:'Noto Sans JP',sans-serif;font-size:15px;
  outline:none;transition:border-color 0.2s;margin-bottom:16px;
}
.login-input:focus{border-color:var(--accent);}
.login-input::placeholder{color:var(--muted);}

.member-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;}
.member-btn {
  padding:12px 10px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;color:var(--muted);font-family:'Noto Sans JP',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center;
}
.member-btn:hover{border-color:var(--accent);color:var(--text);}
.member-btn.selected{background:var(--accent);border-color:var(--accent);color:white;}

.btn-login {
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:12px;color:white;
  font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:900;
  cursor:pointer;transition:all 0.2s;letter-spacing:1px;
}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(255,107,43,0.35);}
.btn-login:disabled{opacity:0.4;pointer-events:none;}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:12px;display:none;}

/* ===== MAIN APP ===== */
#app{display:none;}

header {
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 20px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent);letter-spacing:2px;}
.logo span{color:var(--text);}
.header-right{display:flex;align-items:center;gap:10px;}
.user-chip {
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:99px;padding:5px 14px 5px 8px;
  font-size:13px;font-weight:700;
}
.user-avatar {
  width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;color:white;
}
.admin-toggle {
  background:none;border:1px solid var(--border);color:var(--muted);
  padding:6px 12px;border-radius:99px;font-size:11px;
  font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all 0.2s;
}
.admin-toggle:hover{border-color:var(--accent);color:var(--accent);}
.admin-toggle.active{background:var(--accent);border-color:var(--accent);color:white;}
.logout-btn {
  background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;
  padding:4px;transition:color 0.2s;
}
.logout-btn:hover{color:var(--red);}

/* ===== PAGES ===== */
.page{display:none;}
.page.active{display:block;}

/* ===== STUDENT VIEW ===== */
.container{max-width:860px;margin:0 auto;padding:24px 16px 100px;}

.hero {
  background:linear-gradient(135deg,#1c1c28,#13131a);
  border:1px solid var(--border);border-radius:16px;
  padding:26px 24px;margin-bottom:24px;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(255,107,43,0.12) 0%,transparent 70%);
  pointer-events:none;
}
.hero-label{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:8px;}
.hero h1{font-size:20px;font-weight:900;line-height:1.3;margin-bottom:6px;}
.hero p{font-size:13px;color:var(--muted);}
.progress-bar-wrap{margin-top:18px;background:var(--border);border-radius:99px;height:6px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 0.6s ease;}
.progress-label{margin-top:7px;font-size:12px;color:var(--muted);}

/* category tabs */
.section-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;margin-top:24px;}
.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:7px 15px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all 0.2s;}
.tab.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:700;}
.tab:hover:not(.active){border-color:var(--muted);color:var(--text);}

.video-list{display:flex;flex-direction:column;gap:10px;}
.video-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;display:flex;gap:14px;align-items:flex-start;
  cursor:pointer;transition:all 0.2s;animation:fadeIn 0.3s ease;
}
.video-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,107,43,0.1);}
.video-card.completed{opacity:0.6;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.thumb{
  width:86px;height:56px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;position:relative;overflow:hidden;
}
.thumb-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.25);}
.thumb-overlay::after{content:'▶';font-size:15px;color:white;}

.video-info{flex:1;min-width:0;}
.video-cat{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:3px;}
.video-title{font-size:14px;font-weight:700;line-height:1.4;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.video-meta{display:flex;gap:8px;font-size:12px;color:var(--muted);align-items:center;flex-wrap:wrap;}

.badge{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;}
.badge-done{background:rgba(46,204,113,0.15);color:var(--green);border:1px solid rgba(46,204,113,0.3);}
.badge-new{background:rgba(255,107,43,0.15);color:var(--accent);border:1px solid rgba(255,107,43,0.3);}
.badge-shared{background:rgba(52,152,219,0.15);color:var(--blue);border:1px solid rgba(52,152,219,0.3);}

.empty-state{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px;line-height:2.2;}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:640px;overflow:hidden;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-video{width:100%;aspect-ratio:16/9;background:#000;}
.modal-video iframe{width:100%;height:100%;border:none;}
.modal-body{padding:18px 20px;}
.modal-cat{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:5px;}
.modal-title{font-size:17px;font-weight:900;margin-bottom:8px;}
.modal-desc{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:16px;}
.modal-actions{display:flex;gap:8px;}
.btn{padding:12px 18px;border-radius:10px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-primary{background:var(--accent);color:white;flex:1;}
.btn-primary:hover{background:#ff8050;}
.btn-primary:disabled{opacity:0.45;pointer-events:none;}
.btn-close{background:var(--border);color:var(--muted);padding:12px 14px;}
.btn-close:hover{color:var(--text);}

/* bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 16px;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);cursor:pointer;padding:5px 0;transition:color 0.2s;}
.nav-item.active{color:var(--accent);}
.nav-item svg{width:21px;height:21px;}

/* ===== ADMIN ===== */
.admin-wrap{max-width:720px;margin:0 auto;padding:24px 16px 60px;}
.admin-bar{background:linear-gradient(135deg,rgba(255,107,43,0.1),rgba(255,179,71,0.05));border:1px solid rgba(255,107,43,0.25);border-radius:14px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;}
.admin-bar h2{font-size:15px;font-weight:900;margin-bottom:2px;}
.admin-bar p{font-size:12px;color:var(--muted);}

.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:18px;}
.panel-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:18px;}

.form-group{margin-bottom:14px;}
label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:7px;letter-spacing:0.5px;}
input,select,textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;transition:border-color 0.2s;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
input::placeholder,textarea::placeholder{color:var(--muted);}
select option{background:var(--surface);}
textarea{resize:vertical;min-height:68px;line-height:1.6;}

.type-toggle{display:flex;gap:8px;margin-bottom:14px;}
.type-btn{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center;}
.type-btn.active{background:var(--accent);border-color:var(--accent);color:white;}

/* video type (training vs roleplay) */
.vtype-toggle{display:flex;gap:8px;margin-bottom:14px;}
.vtype-btn{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center;}
.vtype-btn.active{background:var(--blue);border-color:var(--blue);color:white;}

.url-preview{margin-top:8px;padding:9px 13px;background:var(--surface);border:1px solid rgba(46,204,113,0.3);border-radius:8px;font-size:12px;color:var(--muted);display:none;}
.url-preview.visible{display:block;}
.preview-ok{color:var(--green);font-weight:700;margin-bottom:2px;}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:white;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:900;cursor:pointer;transition:all 0.2s;margin-top:4px;}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(255,107,43,0.3);}
.btn-submit:disabled{opacity:0.4;pointer-events:none;}

/* password setting */
.pw-hint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5;}

/* registered */
.reg-item{display:flex;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);animation:fadeIn 0.3s ease;}
.reg-item:last-child{border-bottom:none;}
.reg-emoji{width:36px;height:36px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.reg-info{flex:1;min-width:0;}
.reg-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reg-meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.src-badge{padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;}
.src-yt{background:rgba(255,0,0,0.12);color:#ff5555;border:1px solid rgba(255,0,0,0.2);}
.src-drive{background:rgba(46,204,113,0.12);color:var(--green);border:1px solid rgba(46,204,113,0.2);}
.src-training{background:rgba(255,107,43,0.12);color:var(--accent);border:1px solid rgba(255,107,43,0.2);}
.src-roleplay{background:rgba(52,152,219,0.12);color:var(--blue);border:1px solid rgba(52,152,219,0.2);}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;padding:4px;transition:color 0.2s;flex-shrink:0;}
.del-btn:hover{color:var(--red);}

/* progress table */
.prog-table{width:100%;border-collapse:collapse;font-size:12px;}
.prog-table th{text-align:left;color:var(--muted);font-weight:700;padding:8px 10px;border-bottom:1px solid var(--border);}
.prog-table td{padding:8px 10px;border-bottom:1px solid var(--border);}
.prog-table tr:last-child td{border-bottom:none;}
.prog-bar-mini{background:var(--border);border-radius:99px;height:4px;overflow:hidden;margin-top:4px;}
.prog-bar-mini-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:11px 22px;font-size:14px;font-weight:700;z-index:999;animation:toastIn 0.3s ease;white-space:nowrap;pointer-events:none;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">住援<span>研修動画</span></div>
    <div class="login-subtitle">住援研修動画</div>

    <div class="form-group">
      <span class="login-label">パスワード</span>
      <input class="login-input" type="password" id="pwInput" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')tryLogin()" />
    </div>

    <div class="form-group" style="margin-bottom:24px">
      <span class="login-label">あなたの名前を選んでください</span>
      <div class="member-grid" id="memberGrid">
        <!-- populated by JS -->
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="tryLogin()" disabled>ログイン</button>
    <div class="login-error" id="loginError">パスワードが違います</div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app">
  <header>
    <div class="logo">住援<span>研修動画</span></div>
    <div class="header-right">
      <div class="user-chip">
        <div class="user-avatar" id="avatarLabel"></div>
        <span id="userNameLabel"></span>
      </div>
      <button class="admin-toggle" id="adminToggle" onclick="toggleAdmin()" style="display:none">⚙</button>
      <button class="logout-btn" onclick="logout()" title="ログアウト">↩</button>
    </div>
  </header>

  <!-- STUDENT PAGE -->
  <div class="page active" id="studentPage">
    <div class="container">
      <div class="hero">
        <div class="hero-label">📚 研修ポータル</div>
        <h1 id="heroTitle">今日も一本、学びを積もう 🔥</h1>
        <p id="heroSub"></p>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
        <div class="progress-label" id="progressLabel">読み込み中...</div>
      </div>

      <div class="section-title">カテゴリ</div>
      <div class="tabs" id="tabs">
        <button class="tab active" onclick="filterCat('all',this)">すべて</button>
        <button class="tab" onclick="filterCat('marketing',this)">集客・マーケ</button>
        <button class="tab" onclick="filterCat('monetize',this)">マネタイズ</button>
        <button class="tab" onclick="filterCat('mindset',this)">マインドセット</button>
        <button class="tab" onclick="filterCat('finance',this)">財務・税務</button>
        <button class="tab" onclick="filterCat('roleplay',this)">🎭 ロープレ</button>
        <button class="tab" onclick="filterCat('other',this)">その他</button>
      </div>

      <div class="video-list" id="videoList">
        <div class="empty-state">⏳ 読み込み中...</div>
      </div>
    </div>

    <div class="bottom-nav">
      <div class="nav-item active">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>ホーム
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>さがす
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>進捗
      </div>
    </div>
  </div>

  <!-- ADMIN PAGE -->
  <div class="page" id="adminPage">
    <div class="admin-wrap">
      <div class="admin-bar">
        <span style="font-size:26px">⚙️</span>
        <div>
          <h2>管理者パネル</h2>
          <p>動画追加・削除・パスワード・メンバー設定</p>
        </div>
      </div>

      <!-- GAS URL -->
      <div class="panel">
        <div class="panel-title">🔗 Google Apps Script URL</div>
        <div class="form-group">
          <label>デプロイURL（一度設定すれば保存されます）</label>
          <input type="url" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec" oninput="saveSettings()" />
        </div>
        <button class="btn-submit" style="margin-top:0" onclick="loadFromSheet()">🔄 動画リストを読み込む</button>
      </div>

      <!-- Settings -->
      <div class="panel">
        <div class="panel-title">🔒 パスワード・メンバー設定</div>
        <div class="form-group">
          <label>アプリのパスワード</label>
          <input type="text" id="appPassword" placeholder="例：train2024" oninput="saveSettings()" />
          <div class="pw-hint">※ 変更後は従業員に新しいパスワードを共有してください</div>
        </div>
        <div class="form-group">
          <label>メンバー名（カンマ区切り）</label>
          <input type="text" id="memberNames" placeholder="例：辻,氏家,福田,福島" oninput="saveSettings()" />
        </div>
        <button class="btn-submit" style="margin-top:0;background:linear-gradient(135deg,#2980b9,#3498db)" onclick="applySettings()">✅ 設定を反映する</button>
      </div>

      <!-- Add Video -->
      <div class="panel">
        <div class="panel-title">➕ 動画を追加</div>

        <div style="margin-bottom:8px"><label>動画ソース</label></div>
        <div class="type-toggle">
          <button class="type-btn active" onclick="setSrc('youtube',this)">▶ YouTube</button>
          <button class="type-btn" onclick="setSrc('drive',this)">☁ Google Drive</button>
        </div>

        <div style="margin-bottom:8px"><label>動画タイプ</label></div>
        <div class="vtype-toggle">
          <button class="vtype-btn active" onclick="setVtype('training',this)">📋 研修動画（個人進捗）</button>
          <button class="vtype-btn" onclick="setVtype('roleplay',this)">🎭 ロープレ（全員共通）</button>
        </div>

        <div class="form-group">
          <label id="urlLabel">YouTube URL</label>
          <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." oninput="onUrlInput()" />
          <div class="url-preview" id="urlPreview">
            <div class="preview-ok">✅ URLを認識しました</div>
            <div id="previewText" style="font-size:11px;margin-top:2px"></div>
          </div>
        </div>

        <div class="form-group">
          <label>タイトル</label>
          <input type="text" id="videoTitle" placeholder="例：集客の基本｜SNS活用マスター講座" />
        </div>

        <div class="form-group" id="categoryWrap">
          <label>カテゴリ</label>
          <select id="videoCategory">
            <option value="marketing">集客・マーケ</option>
            <option value="monetize">マネタイズ</option>
            <option value="mindset">マインドセット</option>
            <option value="finance">財務・税務</option>
            <option value="other">その他</option>
          </select>
        </div>

        <div class="two-col">
          <div class="form-group">
            <label>再生時間</label>
            <input type="text" id="videoDuration" placeholder="00:00" />
          </div>
          <div class="form-group">
            <label>絵文字</label>
            <input type="text" id="videoEmoji" placeholder="🎬" maxlength="2" />
          </div>
        </div>

        <div class="form-group">
          <label>説明文（任意）</label>
          <textarea id="videoDesc" placeholder="この動画で学べることを入力..."></textarea>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="addVideo()">＋ 追加する</button>
      </div>

      <!-- Registered -->
      <div class="panel">
        <div class="panel-title" style="display:flex;justify-content:space-between;align-items:center">
          <span>📋 登録済み動画</span>
          <button onclick="loadFromSheet()" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit">🔄 更新</button>
        </div>
        <div id="adminList"><div class="empty-state" style="padding:20px">GAS URLを設定して読み込んでください</div></div>
      </div>

      <!-- Progress overview -->
      <div class="panel">
        <div class="panel-title">📊 メンバー別進捗（研修動画のみ）</div>
        <div id="progressTable"><div class="empty-state" style="padding:16px">データを読み込み中...</div></div>
      </div>

    </div>
  </div>
</div>

<!-- VIDEO MODAL -->
<div class="modal-overlay" id="modal" onclick="handleModalClick(event)">
  <div class="modal">
    <div class="modal-video" id="modalVideo"></div>
    <div class="modal-body">
      <div class="modal-cat" id="modalCat"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="completeBtn" onclick="markComplete()">✅ 視聴完了にする</button>
        <button class="btn btn-close" onclick="closeModal()">閉じる</button>
      </div>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
// 管理者パスワード（ここを変えると管理者パネルに入れる）
// GAS URL（固定）
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxV9jMHJ2i2vxjMpVG5w5wLT9M1uFHNRZNIMmHHpCiHoYd99P_WJJpAXUBcrvhE6V5c/exec';

let ADMIN_PASSWORD = 'admin123';

// デフォルト設定
let settings = {
  password: 'train2024',
  members: ['辻','氏家','福田','福島'],
  gasUrl: GAS_URL
};

const catMap = { marketing:'集客・マーケ', monetize:'マネタイズ', mindset:'マインドセット', finance:'財務・税務', roleplay:'🎭 ロープレ', other:'その他' };

// ===== STATE =====
let videos = [];
let currentUser = null;
let isAdmin = false;
let currentCat = 'all';
let currentVideoId = null;
let srcType = 'youtube';
let vtypeMode = 'training';

// ===== INIT =====
window.addEventListener('load', () => {
  loadSettings();
  renderMemberGrid();
  // pw input listener
  document.getElementById('pwInput').addEventListener('input', checkLoginReady);
});

async function loadSettings() {
  document.getElementById('gasUrl').value = GAS_URL;
  document.getElementById('appPassword').value = settings.password;
  document.getElementById('memberNames').value = settings.members.join(',');
  try {
    const res = await fetch(GAS_URL + '?action=getSettings&t=' + Date.now());
    const data = await res.json();
    if (data.members && data.members.length > 0) {
      settings.members = data.members;
      settings.password = data.password || settings.password;
      ADMIN_PASSWORD = data.adminPassword || ADMIN_PASSWORD;
      document.getElementById('appPassword').value = settings.password;
      document.getElementById('memberNames').value = settings.members.join(',');
    }
  } catch(e) {}
  renderMemberGrid();
}

function saveSettings() {
  settings.password = document.getElementById('appPassword').value.trim();
  const m = document.getElementById('memberNames').value.trim();
  settings.members = m ? m.split(',').map(s=>s.trim()).filter(Boolean) : [];
}

async function applySettings() {
  saveSettings();
  renderMemberGrid();
  // GASに保存
  try {
    await fetch(GAS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        action: 'saveMembers',
        members: settings.members,
        password: settings.password,
        adminPassword: ADMIN_PASSWORD
      })
    });
    showToast('✅ 設定をスプレッドシートに保存しました');
  } catch(e) {
    showToast('✅ 設定を反映しました（ローカルのみ）');
  }
}

// ===== LOGIN =====
function renderMemberGrid() {
  const grid = document.getElementById('memberGrid');
  grid.innerHTML = settings.members.map(name => `
    <button class="member-btn" onclick="selectMember(this,'${name}')">${name}</button>
  `).join('');
  checkLoginReady();
}

let selectedMember = null;
function selectMember(el, name) {
  document.querySelectorAll('.member-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedMember = name;
  checkLoginReady();
}

function checkLoginReady() {
  const pw = document.getElementById('pwInput').value;
  document.getElementById('loginBtn').disabled = !(pw && selectedMember);
}

function tryLogin() {
  const pw = document.getElementById('pwInput').value;
  const err = document.getElementById('loginError');

  // Admin login
  if (pw === ADMIN_PASSWORD && selectedMember) {
    doLogin(selectedMember, true);
    return;
  }
  // Normal login
  if (pw === settings.password && selectedMember) {
    doLogin(selectedMember, false);
    return;
  }
  err.style.display = 'block';
  setTimeout(() => err.style.display = 'none', 2500);
}

function doLogin(name, admin) {
  currentUser = name;
  isAdmin = admin;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userNameLabel').textContent = name;
  document.getElementById('avatarLabel').textContent = name[0];
  if (admin) {
    document.getElementById('adminToggle').style.display = 'block';
  }
  loadFromSheet();
}

function logout() {
  currentUser = null;
  isAdmin = false;
  selectedMember = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pwInput').value = '';
  document.querySelectorAll('.member-btn').forEach(b => b.classList.remove('selected'));
  checkLoginReady();
}

// ===== ADMIN TOGGLE =====
function toggleAdmin() {
  const showAdmin = document.getElementById('adminPage').classList.contains('active') === false;
  document.getElementById('studentPage').classList.toggle('active', !showAdmin);
  document.getElementById('adminPage').classList.toggle('active', showAdmin);
  document.getElementById('adminToggle').classList.toggle('active', showAdmin);
  if (showAdmin) renderProgressTable();
}

// ===== LOAD DATA =====
async function loadFromSheet() {
  const url = settings.gasUrl;
  if (!url) {
    updateHero();
    renderStudentList();
    return;
  }
  try {
    const res = await fetch(url + '?t=' + Date.now());
    videos = await res.json();
    if (!Array.isArray(videos)) videos = [];
  } catch(e) {
    showToast('❌ 読み込み失敗。URLを確認してください');
    videos = [];
  }
  renderStudentList();
  renderAdminList();
  updateHero();
  renderProgressTable();
}

// ===== COMPLETED (per-user) =====
function getCompletedKey(user) { return 'completed_' + user; }
function getUserCompleted(user) {
  return JSON.parse(localStorage.getItem(getCompletedKey(user)) || '[]');
}
function setUserCompleted(user, ids) {
  localStorage.setItem(getCompletedKey(user), JSON.stringify(ids));
}
function isCompleted(videoId) {
  if (!currentUser) return false;
  // roleplay: shared across all users
  const v = videos.find(x => String(x.id) === String(videoId));
  if (v && v.vtype === 'roleplay') {
    return JSON.parse(localStorage.getItem('completed_roleplay') || '[]').includes(String(videoId));
  }
  return getUserCompleted(currentUser).includes(String(videoId));
}
function markVideoCompleted(videoId) {
  const v = videos.find(x => String(x.id) === String(videoId));
  if (v && v.vtype === 'roleplay') {
    const ids = JSON.parse(localStorage.getItem('completed_roleplay') || '[]');
    if (!ids.includes(String(videoId))) ids.push(String(videoId));
    localStorage.setItem('completed_roleplay', JSON.stringify(ids));
  } else {
    const ids = getUserCompleted(currentUser);
    if (!ids.includes(String(videoId))) ids.push(String(videoId));
    setUserCompleted(currentUser, ids);
  }
}

// ===== HERO =====
function updateHero() {
  const training = videos.filter(v => v.vtype !== 'roleplay');
  const total = training.length;
  const done = training.filter(v => isCompleted(v.id)).length;
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `研修動画 ${done} / ${total} 完了`;
  document.getElementById('heroTitle').textContent = currentUser ? `${currentUser}さん、今日も頑張ろう！🔥` : '今日も一本、学びを積もう 🔥';
  document.getElementById('heroSub').textContent = total ? `${total}本の研修動画が用意されています` : '管理者パネルから動画を追加してください';
}

// ===== STUDENT LIST =====
function renderStudentList() {
  const list = document.getElementById('videoList');
  const filtered = currentCat === 'all' ? videos : videos.filter(v => {
    if (currentCat === 'roleplay') return v.vtype === 'roleplay';
    return v.category === currentCat && v.vtype !== 'roleplay';
  });

  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state">この分類の動画はまだありません 🎬</div>';
    return;
  }

  list.innerHTML = filtered.map(v => {
    const done = isCompleted(v.id);
    const isRP = v.vtype === 'roleplay';
    const badge = done
      ? '<span class="badge badge-done">✓ 完了</span>'
      : isRP
        ? '<span class="badge badge-shared">🎭 共通</span>'
        : '<span class="badge badge-new">NEW</span>';
    return `
      <div class="video-card ${done?'completed':''}" onclick="openVideo('${v.id}')">
        <div class="thumb" style="background:linear-gradient(135deg,${catColor(v.category,isRP)}33,${catColor(v.category,isRP)}55)">
          <span>${v.emoji||'🎬'}</span>
          <div class="thumb-overlay"></div>
        </div>
        <div class="video-info">
          <div class="video-cat">${isRP ? '🎭 ロープレ' : (catMap[v.category]||v.category)}</div>
          <div class="video-title">${v.title}</div>
          <div class="video-meta">
            <span>⏱ ${v.duration||'—'}</span>
            ${badge}
          </div>
        </div>
      </div>`;
  }).join('');
}

function catColor(cat, isRP) {
  if (isRP) return '#3498db';
  const c = {marketing:'#ff6b2b',monetize:'#f39c12',mindset:'#8e44ad',finance:'#27ae60',other:'#2980b9'};
  return c[cat] || '#555';
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderStudentList();
}

// ===== VIDEO MODAL =====
function openVideo(id) {
  const v = videos.find(x => String(x.id) === String(id));
  if (!v) return;
  currentVideoId = id;

  document.getElementById('modalCat').textContent = v.vtype === 'roleplay' ? '🎭 ロープレ' : (catMap[v.category]||v.category);
  document.getElementById('modalTitle').textContent = v.title;
  document.getElementById('modalDesc').textContent = v.desc || '';

  const videoEl = document.getElementById('modalVideo');
  if (v.source === 'drive') {
    const did = extractDriveId(v.url);
    videoEl.innerHTML = did ? `<iframe src="https://drive.google.com/file/d/${did}/preview" allowfullscreen></iframe>`
      : `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:var(--muted);font-size:13px">DriveリンクをPC版で全員に共有設定してください</div>`;
  } else {
    const yid = extractYtId(v.url);
    videoEl.innerHTML = yid ? `<iframe src="https://www.youtube.com/embed/${yid}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`
      : `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:var(--muted);font-size:13px">YouTubeリンクが無効です</div>`;
  }

  const done = isCompleted(id);
  const btn = document.getElementById('completeBtn');
  btn.disabled = done;
  btn.textContent = done ? '✅ 視聴済み' : '✅ 視聴完了にする';

  document.getElementById('modal').classList.add('open');
}

function markComplete() {
  markVideoCompleted(currentVideoId);
  closeModal();
  renderStudentList();
  updateHero();
  showToast('🎉 視聴完了！お疲れ様でした');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalVideo').innerHTML = '';
}
function handleModalClick(e) { if (e.target.id === 'modal') closeModal(); }

// ===== ADMIN LIST =====
function renderAdminList() {
  const list = document.getElementById('adminList');
  if (!videos.length) {
    list.innerHTML = '<div class="empty-state" style="padding:20px">まだ動画が登録されていません</div>';
    return;
  }
  list.innerHTML = videos.map(v => `
    <div class="reg-item">
      <div class="reg-emoji">${v.emoji||'🎬'}</div>
      <div class="reg-info">
        <div class="reg-title">${v.title}</div>
        <div class="reg-meta">
          <span>${v.vtype==='roleplay'?'🎭 ロープレ':(catMap[v.category]||v.category)}</span>
          <span>${v.duration||'—'}</span>
          <span class="src-badge ${v.source==='drive'?'src-drive':'src-yt'}">${v.source==='drive'?'☁ Drive':'▶ YouTube'}</span>
          <span class="src-badge ${v.vtype==='roleplay'?'src-roleplay':'src-training'}">${v.vtype==='roleplay'?'🎭共通':'📋個人'}</span>
        </div>
      </div>
      <button class="del-btn" onclick="deleteVideo('${v.id}')">🗑</button>
    </div>`).join('');
}

// ===== PROGRESS TABLE =====
function renderProgressTable() {
  const wrap = document.getElementById('progressTable');
  const trainingVideos = videos.filter(v => v.vtype !== 'roleplay');
  if (!trainingVideos.length) {
    wrap.innerHTML = '<div class="empty-state" style="padding:16px">研修動画がありません</div>';
    return;
  }
  const total = trainingVideos.length;
  const rows = settings.members.map(name => {
    const done = getUserCompleted(name).filter(id => trainingVideos.find(v=>String(v.id)===String(id))).length;
    const pct = Math.round((done/total)*100);
    return `<tr>
      <td style="font-weight:700">${name}</td>
      <td>${done}/${total}<div class="prog-bar-mini"><div class="prog-bar-mini-fill" style="width:${pct}%"></div></div></td>
      <td style="color:var(--accent);font-weight:700">${pct}%</td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table class="prog-table">
    <tr><th>メンバー</th><th>完了本数</th><th>達成率</th></tr>
    ${rows}
  </table>`;
}

// ===== ADD VIDEO =====
async function addVideo() {
  const gasUrl = settings.gasUrl;
  const url = document.getElementById('videoUrl').value.trim();
  const title = document.getElementById('videoTitle').value.trim();
  const category = vtypeMode === 'roleplay' ? 'roleplay' : document.getElementById('videoCategory').value;
  const duration = document.getElementById('videoDuration').value.trim() || '—';
  const emoji = document.getElementById('videoEmoji').value.trim() || '🎬';
  const desc = document.getElementById('videoDesc').value.trim();

  if (!title) { showToast('❗ タイトルを入力してください'); return; }
  if (!url) { showToast('❗ URLを入力してください'); return; }
  if (!gasUrl) { showToast('❗ Apps Script URLを設定してください'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '送信中...';

  const payload = { action:'add', id:Date.now(), title, category, duration, url, source:srcType, vtype:vtypeMode, desc, emoji };

  try {
    await fetch(gasUrl, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    showToast('✅ 追加しました！');
    clearForm();
    setTimeout(loadFromSheet, 1200);
  } catch(e) { showToast('❌ エラーが発生しました'); }
  finally { btn.disabled=false; btn.textContent='＋ 追加する'; }
}

async function deleteVideo(id) {
  if (!confirm('この動画を削除しますか？')) return;
  const gasUrl = settings.gasUrl;
  if (!gasUrl) return;
  try {
    await fetch(gasUrl, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'delete',id}) });
    showToast('🗑 削除しました');
    setTimeout(loadFromSheet, 1200);
  } catch(e) { showToast('❌ 削除に失敗しました'); }
}

// ===== FORM HELPERS =====
function setSrc(type, el) {
  srcType = type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('urlLabel').textContent = type==='youtube'?'YouTube URL':'Google Drive 共有URL';
  document.getElementById('videoUrl').placeholder = type==='youtube'?'https://www.youtube.com/watch?v=...':'https://drive.google.com/file/d/.../view';
  document.getElementById('videoUrl').value='';
  document.getElementById('urlPreview').classList.remove('visible');
}
function setVtype(type, el) {
  vtypeMode = type;
  document.querySelectorAll('.vtype-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('categoryWrap').style.display = type==='roleplay'?'none':'block';
}
function onUrlInput() {
  const url = document.getElementById('videoUrl').value.trim();
  const id = srcType==='youtube'?extractYtId(url):extractDriveId(url);
  const preview = document.getElementById('urlPreview');
  if (id) { document.getElementById('previewText').textContent='ID: '+id; preview.classList.add('visible'); }
  else preview.classList.remove('visible');
}
function clearForm() {
  ['videoUrl','videoTitle','videoDuration','videoEmoji','videoDesc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('urlPreview').classList.remove('visible');
}
function extractYtId(url) { const m=url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/); return m?m[1]:null; }
function extractDriveId(url) { const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/); return m?m[1]:null; }
function showToast(msg) {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}
</script>
</body>
</html>
